<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline de Leads — Andarilho Digital</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a; --bg4: #222;
  --border: rgba(255,255,255,.07); --border2: rgba(255,255,255,.12);
  --accent: #ae330a; --accent2: rgba(174,51,10,.15);
  --text: #e8e8e8; --muted: #555; --muted2: #888;
  --green: #22c55e; --yellow: #f59e0b; --blue: #3b82f6; --purple: #a855f7;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.logo h1 { font-size: 15px; font-weight: 700; }
.logo span { font-size: 12px; color: var(--muted2); }
.header-actions { display: flex; gap: 8px; }

.stats-bar {
  padding: 16px 24px;
  display: flex; gap: 12px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; min-width: 120px; }
.stat-value { font-size: 24px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 11px; color: var(--muted2); margin-top: 4px; }
.stat.green .stat-value { color: var(--green); }
.stat.yellow .stat-value { color: var(--yellow); }
.stat.blue .stat-value { color: var(--blue); }
.stat.accent .stat-value { color: #ff6b3d; }

.toolbar {
  padding: 12px 24px;
  display: flex; gap: 10px; align-items: center;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.search-box {
  flex: 1; min-width: 200px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  color: var(--text); font-size: 13px; outline: none;
}
.search-box:focus { border-color: rgba(174,51,10,.4); }
select.filter-select {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  color: var(--text); font-size: 13px; outline: none; cursor: pointer;
}

.btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: .85; }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--border2); }
.btn-green { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
.btn-blue { background: rgba(59,130,246,.15); color: var(--blue); border: 1px solid rgba(59,130,246,.25); }
.btn-red { background: rgba(239,68,68,.1); color: #ef4444; border: 1px solid rgba(239,68,68,.2); }
.btn-sm { padding: 5px 10px; font-size: 11px; }

.kanban {
  display: flex; gap: 0;
  overflow-x: auto;
  flex: 1;
  padding: 20px 24px;
  min-height: calc(100vh - 180px);
}
.col { min-width: 240px; max-width: 260px; flex-shrink: 0; margin-right: 12px; }
.col-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  border-radius: 10px 10px 0 0;
  border: 1px solid var(--border); border-bottom: none;
  background: var(--bg2);
}
.col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
.col-count { font-size: 11px; background: var(--bg4); border: 1px solid var(--border); border-radius: 20px; padding: 1px 7px; color: var(--muted2); }
.col-body {
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 10px 10px;
  background: var(--bg2); padding: 8px;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 200px;
}

.col[data-status="encontrado"] .col-header { border-top: 3px solid var(--muted2); }
.col[data-status="contatado"]  .col-header { border-top: 3px solid var(--blue); }
.col[data-status="respondeu"]  .col-header { border-top: 3px solid var(--yellow); }
.col[data-status="video"]      .col-header { border-top: 3px solid var(--purple); }
.col[data-status="reuniao"]    .col-header { border-top: 3px solid #06b6d4; }
.col[data-status="fechado"]    .col-header { border-top: 3px solid var(--green); }

.lead-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  cursor: grab; transition: all .2s;
}
.lead-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.lead-card.dragging { opacity: .4; cursor: grabbing; }
.col-body.drag-over { background: rgba(174,51,10,.08); border-color: rgba(174,51,10,.3); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
.card-name { font-size: 13px; font-weight: 600; line-height: 1.3; flex: 1; }
.card-del { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 0 0 0 4px; line-height: 1; flex-shrink: 0; }
.card-del:hover { color: #ef4444; }
.card-nicho {
  font-size: 10px; padding: 2px 7px; border-radius: 20px;
  white-space: nowrap; flex-shrink: 0;
}
.nicho-pet     { background: rgba(168,85,247,.15);  color: #c084fc; border: 1px solid rgba(168,85,247,.25); }
.nicho-clinica { background: rgba(59,130,246,.15);  color: #60a5fa; border: 1px solid rgba(59,130,246,.25); }
.nicho-salao   { background: rgba(168,85,247,.15);  color: #c084fc; border: 1px solid rgba(168,85,247,.25); }
.nicho-restaurante { background: rgba(245,158,11,.15); color: #fbbf24; border: 1px solid rgba(245,158,11,.25); }
.nicho-academia { background: rgba(239,68,68,.15);  color: #f87171; border: 1px solid rgba(239,68,68,.25); }
.nicho-autonomo { background: rgba(20,184,166,.15); color: #2dd4bf; border: 1px solid rgba(20,184,166,.25); }
.nicho-loja    { background: rgba(251,146,60,.15);  color: #fb923c; border: 1px solid rgba(251,146,60,.25); }
.nicho-outro   { background: rgba(148,163,184,.12); color: #94a3b8; border: 1px solid rgba(148,163,184,.2); }
.card-nota { font-size: 11px; color: var(--muted2); margin-top: 6px; line-height: 1.4; }
.card-actions { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
.card-date { font-size: 10px; color: var(--muted); margin-top: 4px; }

.empty-col { border: 1px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; color: var(--muted); font-size: 12px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; width: 90%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 24px; }
.modal h2 { font-size: 18px; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--muted2); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color .2s; font-family: inherit;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: rgba(174,51,10,.5); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

.detail-section { margin-bottom: 20px; }
.detail-section h3 { font-size: 12px; color: var(--muted2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; font-weight: 700; }
.detail-msg { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
.status-steps { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.step-btn {
  padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); background: var(--bg3); color: var(--muted2);
  cursor: pointer; transition: all .2s;
}
.step-btn.active { border-color: var(--accent); color: var(--text); background: var(--accent2); }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 16px; font-size: 13px; z-index: 200; transform: translateY(80px); opacity: 0; transition: all .3s; pointer-events: none; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.green { border-color: rgba(34,197,94,.3); color: var(--green); }
.toast.red { border-color: rgba(239,68,68,.3); color: #ef4444; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <h1>Pipeline de Leads</h1>
      <span>Andarilho Digital · Sistema de Prospecção</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="exportarLeads()">Exportar CSV</button>
    <button class="btn btn-secondary" onclick="limparColuna('encontrado')" title="Remove todos os leads da coluna Encontrado">Limpar Encontrado</button>
    <a href="painel-andarilho.html" class="btn btn-secondary" style="text-decoration:none;color:inherit;">← CRM</a>
    <label class="btn btn-secondary" style="cursor:pointer;" title="Importa o arquivo leads-prospectados.json gerado pelo agente">
      Importar Leads
      <input type="file" accept=".json" style="display:none;" onchange="importarJSON(this)">
    </label>
    <button class="btn btn-primary" onclick="abrirModalNovo()">+ Novo Lead</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total de leads</div></div>
  <div class="stat green"><div class="stat-value" id="stat-fechados">0</div><div class="stat-label">Fechados</div></div>
  <div class="stat yellow"><div class="stat-value" id="stat-responderam">0</div><div class="stat-label">Responderam</div></div>
  <div class="stat blue"><div class="stat-value" id="stat-contatados">0</div><div class="stat-label">Contatados</div></div>
  <div class="stat accent"><div class="stat-value" id="stat-conversao">0%</div><div class="stat-label">Taxa de conversão</div></div>
</div>

<div class="toolbar">
  <input type="text" class="search-box" placeholder="Buscar por nome, nicho ou cidade..." oninput="filtrarLeads(this.value)">
  <select class="filter-select" onchange="filtrarPorNicho(this.value)">
    <option value="">Todos os nichos</option>
    <option value="pet shop">Pet Shop</option>
    <option value="clínica">Clínica</option>
    <option value="restaurante">Restaurante</option>
    <option value="salão">Salão</option>
    <option value="academia">Academia</option>
    <option value="autônomo">Autônomo</option>
  </select>
</div>

<div class="kanban" id="kanban"></div>

<!-- MODAL NOVO LEAD -->
<div class="modal-overlay" id="modal-novo">
  <div class="modal">
    <h2>Novo Lead</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Nome do negócio *</label>
        <input type="text" id="f-nome" placeholder="Ex: Clínica da Dra. Ana">
      </div>
      <div class="form-group">
        <label>Nicho *</label>
        <select id="f-nicho">
          <option value="">Seleciona...</option>
          <option value="pet shop">Pet Shop</option>
          <option value="clínica">Clínica</option>
          <option value="restaurante">Restaurante</option>
          <option value="salão">Salão</option>
          <option value="academia">Academia</option>
          <option value="autônomo">Autônomo</option>
          <option value="loja">Loja</option>
          <option value="outro">Outro</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>WhatsApp</label>
        <input type="text" id="f-whatsapp" placeholder="5511999999999">
      </div>
      <div class="form-group">
        <label>Cidade</label>
        <input type="text" id="f-cidade" placeholder="São Paulo">
      </div>
    </div>
    <div class="form-group">
      <label>Instagram / Site</label>
      <input type="text" id="f-site" placeholder="@perfil ou site.com.br">
    </div>
    <div class="form-group">
      <label>Problema observado</label>
      <textarea id="f-problema" rows="2" placeholder="O que você percebeu que indica dor..."></textarea>
    </div>
    <div class="form-group">
      <label>Mensagem de primeiro contato</label>
      <textarea id="f-mensagem" rows="4" placeholder="Escreve aqui a mensagem que vai mandar..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="fecharModal('modal-novo')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarLead()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHE -->
<div class="modal-overlay" id="modal-detalhe">
  <div class="modal" style="max-width:640px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
      <div>
        <h2 id="d-nome" style="margin-bottom:4px;"></h2>
        <span id="d-nicho" style="font-size:12px;color:var(--muted2);"></span>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="fecharModal('modal-detalhe')">Fechar</button>
    </div>

    <div class="detail-section">
      <h3>Status do lead</h3>
      <div class="status-steps" id="d-status-steps"></div>
    </div>

    <div class="detail-section">
      <h3>Informações</h3>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="form-group" style="margin:0;">
          <label>WhatsApp</label>
          <input type="text" id="d-whatsapp" placeholder="5511999999999" onchange="salvarCampo('whatsapp', this.value)">
        </div>
        <div class="form-row">
          <div class="form-group" style="margin:0;">
            <label>Site</label>
            <input type="text" id="d-site" placeholder="site.com.br" onchange="salvarCampo('site', this.value)">
          </div>
          <div class="form-group" style="margin:0;">
            <label>Instagram</label>
            <input type="text" id="d-instagram" placeholder="@perfil" onchange="salvarCampo('instagram', this.value)">
          </div>
        </div>
        <div class="form-group" style="margin:0;">
          <label>Problema observado</label>
          <textarea id="d-problema" rows="2" onchange="salvarCampo('problema', this.value)"></textarea>
        </div>
      </div>
    </div>

    <div class="detail-section">
      <h3>Mensagem de primeiro contato</h3>
      <textarea id="d-mensagem" rows="5" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;line-height:1.6;resize:vertical;" placeholder="Escreve aqui a mensagem que vai mandar para esse lead..." onchange="salvarCampo('mensagem', this.value)"></textarea>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
        <button class="btn btn-green btn-sm" onclick="copiarMensagem()">Copiar mensagem</button>
        <button class="btn btn-blue btn-sm" id="d-btn-whatsapp" onclick="abrirWhatsApp()">Abrir WhatsApp</button>
        <button class="btn btn-secondary btn-sm" id="d-btn-instagram" onclick="abrirInstagram()" style="display:none;">Abrir Instagram DM</button>
      </div>
    </div>

    <div class="detail-section" id="d-presenca-section" style="display:none;">
      <h3>Presença Digital</h3>
      <div id="d-presenca" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;color:var(--muted2);line-height:1.8;"></div>
    </div>

    <div class="detail-section">
      <h3>Notas / Follow-up</h3>
      <textarea id="d-notas" rows="3" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;line-height:1.6;resize:vertical;" placeholder="Anotações, datas de follow-up, observações..." onchange="salvarCampo('notas', this.value)"></textarea>
    </div>

    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn btn-red btn-sm" onclick="deletarLeadAtual()">Remover lead</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLUNAS = [
  { status: 'encontrado', label: 'Encontrado',    cor: 'var(--muted2)' },
  { status: 'contatado',  label: 'Contatado',     cor: 'var(--blue)' },
  { status: 'respondeu',  label: 'Respondeu',     cor: 'var(--yellow)' },
  { status: 'video',      label: 'Vídeo enviado', cor: 'var(--purple)' },
  { status: 'reuniao',    label: 'Reunião',        cor: '#06b6d4' },
  { status: 'fechado',    label: 'Fechado ✓',     cor: 'var(--green)' },
];

let leads = JSON.parse(localStorage.getItem('pipeline_leads') || '[]');
let leadAtual = null;
let filtroTexto = '';
let filtroNicho = '';

function salvar() { localStorage.setItem('pipeline_leads', JSON.stringify(leads)); }

function toast(msg, tipo = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${tipo}`;
  setTimeout(() => t.className = 'toast', 2500);
}

// ── RENDER ───────────────────────────────────────────────
function render() {
  atualizarStats();
  const kanban = document.getElementById('kanban');
  kanban.innerHTML = '';

  const filtrados = leads.filter(l => {
    const txt = filtroTexto.toLowerCase();
    const matchTexto = !txt || l.nome.toLowerCase().includes(txt) || (l.cidade||'').toLowerCase().includes(txt) || l.nicho.toLowerCase().includes(txt);
    const matchNicho = !filtroNicho || l.nicho === filtroNicho;
    return matchTexto && matchNicho;
  });

  COLUNAS.forEach(col => {
    const colLeads = filtrados.filter(l => l.status === col.status);
    const div = document.createElement('div');
    div.className = 'col';
    div.dataset.status = col.status;
    div.innerHTML = `
      <div class="col-header">
        <span class="col-title">${col.label}</span>
        <span class="col-count">${colLeads.length}</span>
      </div>
      <div class="col-body"
        data-status="${col.status}"
        ondragover="dragOver(event)"
        ondragleave="dragLeave(event)"
        ondrop="drop(event,'${col.status}')">
        ${colLeads.length === 0 ? '<div class="empty-col">Nenhum lead</div>' : colLeads.map(renderCard).join('')}
      </div>`;
    kanban.appendChild(div);
  });
}

const NICHO_CLASS = {
  'pet shop':    'nicho-pet',
  'clínica':     'nicho-clinica',
  'salão':       'nicho-salao',
  'restaurante': 'nicho-restaurante',
  'academia':    'nicho-academia',
  'autônomo':    'nicho-autonomo',
  'loja':        'nicho-loja',
  'outro':       'nicho-outro',
};

function renderCard(lead) {
  const nichoClass = NICHO_CLASS[lead.nicho] || 'nicho-outro';
  return `
    <div class="lead-card"
      draggable="true"
      data-id="${lead.id}"
      onclick="abrirDetalhe('${lead.id}')"
      ondragstart="dragStart(event,'${lead.id}')"
      ondragend="dragEnd(event)">
      <div class="card-top">
        <div class="card-name">${lead.nome}</div>
        <div class="card-nicho ${nichoClass}">${lead.nicho}</div>
        <button class="card-del" onclick="event.stopPropagation();deletarLead('${lead.id}')" title="Remover">×</button>
      </div>
      ${lead.problema ? `<div class="card-nota">${lead.problema.slice(0,70)}${lead.problema.length>70?'...':''}</div>` : ''}
      <div class="card-actions">
        ${lead.whatsapp
          ? `<button class="btn btn-green btn-sm" onclick="event.stopPropagation();abrirWA('${lead.id}')">WhatsApp</button>`
          : lead.instagram
            ? `<button class="btn btn-blue btn-sm" onclick="event.stopPropagation();abrirIG('${lead.id}')">Instagram DM</button>`
            : ''}
        ${lead.canal === 'instagram' && lead.whatsapp ? `<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();abrirIG('${lead.id}')">Instagram</button>` : ''}
      </div>
      <div class="card-date">${lead.cidade || ''} · ${formatData(lead.criadoEm)}</div>
    </div>`;
}

function atualizarStats() {
  document.getElementById('stat-total').textContent = leads.length;
  document.getElementById('stat-fechados').textContent = leads.filter(l=>l.status==='fechado').length;
  document.getElementById('stat-responderam').textContent = leads.filter(l=>['respondeu','video','reuniao','fechado'].includes(l.status)).length;
  document.getElementById('stat-contatados').textContent = leads.filter(l=>l.status!=='encontrado').length;
  const conv = leads.length > 0 ? Math.round(leads.filter(l=>l.status==='fechado').length / leads.length * 100) : 0;
  document.getElementById('stat-conversao').textContent = conv + '%';
}

// ── DRAG AND DROP ────────────────────────────────────────
let dragId = null;

function dragStart(e, id) {
  dragId = id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.col-body').forEach(c => c.classList.remove('drag-over'));
}
function dragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function drop(e, novoStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  const lead = leads.find(l => l.id === dragId);
  if (lead && lead.status !== novoStatus) {
    lead.status = novoStatus;
    salvar(); render();
    toast(`Movido para ${COLUNAS.find(c=>c.status===novoStatus)?.label}`, 'green');
  }
  dragId = null;
}

// ── FILTROS ──────────────────────────────────────────────
function filtrarLeads(v) { filtroTexto = v; render(); }
function filtrarPorNicho(v) { filtroNicho = v; render(); }

// ── MODAL NOVO ───────────────────────────────────────────
function abrirModalNovo() { document.getElementById('modal-novo').classList.add('open'); }
function fecharModal(id) { document.getElementById(id).classList.remove('open'); }

function salvarLead() {
  const nome = document.getElementById('f-nome').value.trim();
  const nicho = document.getElementById('f-nicho').value;
  if (!nome || !nicho) return toast('Nome e nicho são obrigatórios', 'red');
  leads.unshift({
    id: Date.now().toString(),
    nome, nicho,
    whatsapp:  document.getElementById('f-whatsapp').value.trim(),
    cidade:    document.getElementById('f-cidade').value.trim(),
    site:      document.getElementById('f-site').value.trim(),
    problema:  document.getElementById('f-problema').value.trim(),
    mensagem:  document.getElementById('f-mensagem').value.trim(),
    notas:     '',
    status:    'encontrado',
    criadoEm:  new Date().toISOString(),
  });
  salvar(); render();
  fecharModal('modal-novo');
  limparForm();
  toast('Lead adicionado!', 'green');
}

function limparForm() {
  ['f-nome','f-nicho','f-whatsapp','f-cidade','f-site','f-problema','f-mensagem'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
}

// ── DETALHE ──────────────────────────────────────────────
function abrirDetalhe(id) {
  leadAtual = leads.find(l => l.id === id);
  if (!leadAtual) return;

  document.getElementById('d-nome').textContent = leadAtual.nome;
  document.getElementById('d-nicho').textContent = leadAtual.nicho + (leadAtual.cidade ? ' · ' + leadAtual.cidade : '');
  document.getElementById('d-whatsapp').value   = leadAtual.whatsapp   || '';
  document.getElementById('d-site').value       = leadAtual.site       || '';
  document.getElementById('d-instagram').value  = leadAtual.instagram  || '';
  document.getElementById('d-problema').value   = leadAtual.problema   || '';
  document.getElementById('d-mensagem').value   = leadAtual.mensagem   || '';
  document.getElementById('d-notas').value      = leadAtual.notas      || '';

  // Botões de canal
  const btnWA    = document.getElementById('d-btn-whatsapp');
  const btnInsta = document.getElementById('d-btn-instagram');
  if (leadAtual.whatsapp) {
    btnWA.style.display = '';
    btnInsta.style.display = leadAtual.instagram ? '' : 'none';
  } else {
    btnWA.style.display = 'none';
    btnInsta.style.display = leadAtual.instagram ? '' : 'none';
  }

  // Presença digital
  const presSecao = document.getElementById('d-presenca-section');
  const presEl    = document.getElementById('d-presenca');
  if (leadAtual.presencaDigital) {
    presEl.innerHTML = leadAtual.presencaDigital
      .split(' | ')
      .map(p => `<div style="margin-bottom:2px;">· ${p}</div>`)
      .join('');
    presSecao.style.display = '';
  } else {
    presSecao.style.display = 'none';
  }

  const steps = document.getElementById('d-status-steps');
  steps.innerHTML = COLUNAS.map(c => `
    <button class="step-btn ${leadAtual.status === c.status ? 'active' : ''}"
      onclick="mudarStatus('${c.status}')">
      ${c.label}
    </button>`).join('');

  document.getElementById('modal-detalhe').classList.add('open');
}

function salvarCampo(campo, valor) {
  if (!leadAtual) return;
  leadAtual[campo] = valor;
  salvar(); render();
}

function mudarStatus(status) {
  if (!leadAtual) return;
  leadAtual.status = status;
  salvar(); render();
  abrirDetalhe(leadAtual.id);
  toast('Status atualizado!', 'green');
}

// ── AÇÕES ────────────────────────────────────────────────
function copiarMsgId(id) {
  const lead = leads.find(l => l.id === id);
  if (lead?.mensagem) { navigator.clipboard.writeText(lead.mensagem); toast('Mensagem copiada!', 'green'); }
  else toast('Nenhuma mensagem salva', 'red');
}
function copiarMensagem() {
  const msg = document.getElementById('d-mensagem').value.trim();
  if (msg) { navigator.clipboard.writeText(msg); toast('Mensagem copiada!', 'green'); }
  else toast('Nenhuma mensagem para copiar', 'red');
}
function abrirWA(id) {
  const lead = leads.find(l => l.id === id);
  if (lead?.whatsapp) window.open(`https://wa.me/${lead.whatsapp.replace(/\D/g,'')}`, '_blank');
}
function abrirIG(id) {
  const lead = leads.find(l => l.id === id);
  const ig = (lead?.instagram || '').replace('@', '');
  if (ig) window.open(`https://www.instagram.com/${ig}/`, '_blank');
}
function abrirWhatsApp() {
  const wpp = document.getElementById('d-whatsapp').value.trim();
  if (wpp) window.open(`https://wa.me/${wpp.replace(/\D/g,'')}`, '_blank');
  else toast('WhatsApp não preenchido', 'red');
}
function abrirInstagram() {
  const ig = (document.getElementById('d-instagram').value || '').trim().replace('@', '');
  if (ig) window.open(`https://www.instagram.com/${ig}/`, '_blank');
  else toast('Instagram não preenchido', 'red');
}
function deletarLeadAtual() {
  if (!leadAtual || !confirm('Remover este lead?')) return;
  leads = leads.filter(l => l.id !== leadAtual.id);
  salvar(); render();
  fecharModal('modal-detalhe');
  toast('Lead removido');
}
function deletarLead(id) {
  leads = leads.filter(l => l.id !== id);
  salvar(); render();
  toast('Lead removido');
}
function limparColuna(status) {
  const n = leads.filter(l => l.status === status).length;
  if (!n) return toast('Coluna já está vazia');
  if (!confirm(`Remover ${n} lead(s) da coluna "${status}"?`)) return;
  leads = leads.filter(l => l.status !== status);
  salvar(); render();
  toast(`${n} leads removidos`, 'green');
}
function formatData(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
}
function exportarLeads() {
  const csv = ['Nome,Nicho,Cidade,WhatsApp,Instagram,Site,Canal,Status,Problema,Presença Digital,Notas'].concat(
    leads.map(l => `"${l.nome}","${l.nicho}","${l.cidade||''}","${l.whatsapp||''}","${l.instagram||''}","${l.site||''}","${l.canal||''}","${l.status}","${(l.problema||'').replace(/"/g,"'")}","${(l.presencaDigital||'').replace(/"/g,"'")}","${(l.notas||'').replace(/"/g,"'")}"`)
  ).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'leads-andarilho.csv';
  a.click();
  toast('CSV exportado!', 'green');
}

// ── IMPORTAR JSON DO AGENTE ──────────────────────────────────
function importarJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const novos = JSON.parse(e.target.result);
      if (!Array.isArray(novos)) return toast('Arquivo inválido', 'red');
      const existentes = new Set(leads.map(l => l.nome.toLowerCase().trim()));
      const paraAdd = novos
        .filter(l => !existentes.has((l.nome||'').toLowerCase().trim()))
        .map(l => ({ notas: '', mensagem: '', status: 'encontrado', criadoEm: new Date().toISOString(), ...l, id: Date.now().toString() + Math.random() }));
      leads = [...paraAdd, ...leads];
      salvar(); render();
      toast(`${paraAdd.length} leads importados!`, 'green');
    } catch { toast('Erro ao ler o arquivo', 'red'); }
    input.value = '';
  };
  reader.readAsText(file);
}

salvar();
