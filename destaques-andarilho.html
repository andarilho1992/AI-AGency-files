<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Destaques — Andarilho Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111113;
  font-family: 'Inter', sans-serif;
  padding: 40px 20px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}

h1 {
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 0;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

/* Cada capa é 420×420px no HTML → export 1080×1080px */
.cover {
  width: 420px;
  height: 420px;
  position: relative;
  overflow: hidden;
  border-radius: 4px;
}

.cover-label {
  color: rgba(255,255,255,0.3);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-align: center;
  margin-top: 8px;
}

/* ── BACKGROUNDS ── */
.bg-1 {
  background:
    radial-gradient(ellipse 80% 80% at 50% 110%, rgba(174,51,10,0.30) 0%, transparent 65%),
    #0d0d0e;
}
.bg-2 {
  background:
    radial-gradient(ellipse 70% 70% at 50% 110%, rgba(174,51,10,0.22) 0%, transparent 65%),
    #0d0d0e;
}
.bg-3 {
  background:
    radial-gradient(ellipse 80% 80% at 50% 110%, rgba(174,51,10,0.28) 0%, transparent 65%),
    #0d0d0e;
}
.bg-4 {
  background:
    radial-gradient(ellipse 70% 70% at 50% 110%, rgba(174,51,10,0.20) 0%, transparent 65%),
    #0d0d0e;
}
.bg-5 {
  background:
    radial-gradient(ellipse 80% 80% at 50% 110%, rgba(174,51,10,0.25) 0%, transparent 65%),
    #0d0d0e;
}

/* ── ICON WRAPPER ── */
.icon-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.icon-circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: rgba(174,51,10,0.12);
  border: 1.5px solid rgba(231,201,163,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
}

.cover-name {
  font-size: 18px;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.5px;
}

/* Bottom bar */
.bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(to right, #ae330a, #e7c9a3);
}
</style>
</head>
<body>

<h1>Capas dos Destaques — Andarilho Digital</h1>

<div class="grid">

  <!-- 1. AUTOMAÇÕES -->
  <div>
    <div class="cover bg-1" id="cover-1">
      <div class="icon-wrap">
        <div class="icon-circle">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="#e7c9a3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="cover-name">Automações</div>
      </div>
      <div class="bottom-bar"></div>
    </div>
    <div class="cover-label">1 — Automações</div>
  </div>

  <!-- 2. PROJETOS -->
  <div>
    <div class="cover bg-2" id="cover-2">
      <div class="icon-wrap">
        <div class="icon-circle">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
            <polyline points="20 6 9 17 4 12" stroke="#e7c9a3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="cover-name">Projetos</div>
      </div>
      <div class="bottom-bar"></div>
    </div>
    <div class="cover-label">2 — Projetos</div>
  </div>

  <!-- 3. COMO FUNCIONA -->
  <div>
    <div class="cover bg-3" id="cover-3">
      <div class="icon-wrap">
        <div class="icon-circle">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="#e7c9a3" stroke-width="1.5"/>
            <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" stroke="#e7c9a3" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="cover-name">Como funciona</div>
      </div>
      <div class="bottom-bar"></div>
    </div>
    <div class="cover-label">3 — Como funciona</div>
  </div>

  <!-- 4. BASTIDOR -->
  <div>
    <div class="cover bg-4" id="cover-4">
      <div class="icon-wrap">
        <div class="icon-circle">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
            <path d="M23 7l-7 5 7 5V7z" stroke="#e7c9a3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2" stroke="#e7c9a3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="cover-name">Bastidor</div>
      </div>
      <div class="bottom-bar"></div>
    </div>
    <div class="cover-label">4 — Bastidor</div>
  </div>

  <!-- 5. PROCESSO -->
  <div>
    <div class="cover bg-5" id="cover-5">
      <div class="icon-wrap">
        <div class="icon-circle">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
            <polyline points="17 1 21 5 17 9" stroke="#e7c9a3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 11V9a4 4 0 0 1 4-4h14" stroke="#e7c9a3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="7 23 3 19 7 15" stroke="#e7c9a3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M21 13v2a4 4 0 0 1-4 4H3" stroke="#e7c9a3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="cover-name">Processo</div>
      </div>
      <div class="bottom-bar"></div>
    </div>
    <div class="cover-label">5 — Processo</div>
  </div>

</div>
</body>
</html>
