<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orçamentos — Orçamentos Pro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">📋</span>
      <span class="logo-text">Orçamentos<strong>Pro</strong></span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">
        <span class="nav-icon">◼</span> Dashboard
      </a>
      <a href="novo-orcamento.html" class="nav-item">
        <span class="nav-icon">＋</span> Novo Orçamento
      </a>
      <a href="orcamentos.html" class="nav-item active">
        <span class="nav-icon">📄</span> Orçamentos
      </a>
      <a href="clientes.html" class="nav-item">
        <span class="nav-icon">👥</span> Clientes
      </a>
      <a href="configuracoes.html" class="nav-item">
        <span class="nav-icon">⚙️</span> Configurações
      </a>
    </nav>
    <div class="sidebar-empresa">
      <span id="empresa-nome">Minha Empresa</span>
    </div>
  </aside>

  <main class="main-content">

    <header class="page-header">
      <div>
        <h1>Orçamentos</h1>
        <p class="subtitle">Todos os seus orçamentos</p>
      </div>
      <a href="novo-orcamento.html" class="btn btn-primary">+ Novo Orçamento</a>
    </header>

    <!-- FILTROS -->
    <div class="filter-bar">
      <input type="text" id="busca" placeholder="Buscar por cliente ou título..." oninput="filtrar()" />
      <select id="filtro-status" onchange="filtrar()">
        <option value="">Todos os status</option>
        <option value="rascunho">Rascunho</option>
        <option value="pendente">Pendente</option>
        <option value="enviado">Enviado</option>
        <option value="aceito">Aceito</option>
        <option value="recusado">Recusado</option>
      </select>
    </div>

    <div class="section-card">
      <table class="data-table">
        <thead>
          <tr>
            <th>Nº</th>
            <th>Título</th>
            <th>Cliente</th>
            <th>Total</th>
            <th>Status</th>
            <th>Data</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-orcamentos">
          <tr class="empty-row"><td colspan="7">Nenhum orçamento ainda.</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const config = Storage.getConfig();
      if (config.empresa) document.getElementById('empresa-nome').textContent = config.empresa;

      // Filtro por cliente via URL
      const params = new URLSearchParams(window.location.search);
      // (suporte futuro para ?cliente=id)
      filtrar();
    });

    function filtrar() {
      const busca = document.getElementById('busca').value.toLowerCase();
      const status = document.getElementById('filtro-status').value;

      let lista = Storage.getOrcamentos()
        .sort((a, b) => new Date(b.criadoEm) - new Date(a.criadoEm));

      if (busca) {
        lista = lista.filter(o =>
          o.clienteNome.toLowerCase().includes(busca) ||
          o.titulo.toLowerCase().includes(busca)
        );
      }
      if (status) {
        lista = lista.filter(o => o.status === status);
      }

      const tbody = document.getElementById('tabela-orcamentos');
      if (lista.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="7">Nenhum orçamento encontrado.</td></tr>`;
        return;
      }

      tbody.innerHTML = lista.map(o => `
        <tr>
          <td><strong>#${o.numero}</strong></td>
          <td>${o.titulo}</td>
          <td>${o.clienteNome}</td>
          <td>${formatarMoeda(o.total)}</td>
          <td><span class="badge badge-${o.status}">${traduzirStatus(o.status)}</span></td>
          <td>${formatarData(o.criadoEm)}</td>
          <td>
            <a href="visualizar-orcamento.html?id=${o.id}" class="btn-link">Ver</a>
            <a href="novo-orcamento.html?id=${o.id}" class="btn-link">Editar</a>
            <button onclick="excluirOrcamento('${o.id}')" class="btn-link text-red">Excluir</button>
          </td>
        </tr>
      `).join('');
    }

    function excluirOrcamento(id) {
      if (!confirm('Excluir este orçamento?')) return;
      Storage.excluirOrcamento(id);
      filtrar();
      mostrarToast('Orçamento excluído.');
    }
  </script>
</body>
</html>
