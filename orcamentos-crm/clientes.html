<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes — Orçamentos Pro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">📋</span>
      <span class="logo-text">Orçamentos<strong>Pro</strong></span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">
        <span class="nav-icon">◼</span> Dashboard
      </a>
      <a href="novo-orcamento.html" class="nav-item">
        <span class="nav-icon">＋</span> Novo Orçamento
      </a>
      <a href="orcamentos.html" class="nav-item">
        <span class="nav-icon">📄</span> Orçamentos
      </a>
      <a href="clientes.html" class="nav-item active">
        <span class="nav-icon">👥</span> Clientes
      </a>
      <a href="configuracoes.html" class="nav-item">
        <span class="nav-icon">⚙️</span> Configurações
      </a>
    </nav>
    <div class="sidebar-empresa">
      <span id="empresa-nome">Minha Empresa</span>
    </div>
  </aside>

  <main class="main-content">

    <header class="page-header">
      <div>
        <h1>Clientes</h1>
        <p class="subtitle">Gerencie sua base de clientes</p>
      </div>
      <button onclick="abrirModal()" class="btn btn-primary">+ Novo Cliente</button>
    </header>

    <!-- BUSCA -->
    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar por nome, email ou empresa..." oninput="filtrarClientes()" />
    </div>

    <div class="section-card">
      <table class="data-table">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Empresa</th>
            <th>E-mail</th>
            <th>Telefone</th>
            <th>Orçamentos</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-clientes">
          <tr class="empty-row"><td colspan="6">Nenhum cliente cadastrado.</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <!-- MODAL NOVO/EDITAR CLIENTE -->
  <div class="modal-overlay" id="modal-overlay" onclick="fecharModal()" style="display:none"></div>
  <div class="modal" id="modal-cliente" style="display:none">
    <div class="modal-header">
      <h2 id="modal-titulo">Novo Cliente</h2>
      <button onclick="fecharModal()" class="modal-close">✕</button>
    </div>
    <form id="form-cliente" onsubmit="salvarCliente(event)">
      <input type="hidden" id="cliente-id" />
      <div class="form-row">
        <div class="form-group">
          <label for="c-nome">Nome <span class="required">*</span></label>
          <input type="text" id="c-nome" required placeholder="João Silva" />
        </div>
        <div class="form-group">
          <label for="c-empresa">Empresa</label>
          <input type="text" id="c-empresa" placeholder="Silva & Cia" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="c-email">E-mail</label>
          <input type="email" id="c-email" placeholder="joao@email.com" />
        </div>
        <div class="form-group">
          <label for="c-telefone">Telefone / WhatsApp</label>
          <input type="tel" id="c-telefone" placeholder="(11) 99999-9999" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full-width">
          <label for="c-obs">Observações</label>
          <textarea id="c-obs" rows="2" placeholder="Notas sobre o cliente..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" onclick="fecharModal()" class="btn btn-secondary">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar Cliente</button>
      </div>
    </form>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    let clientesData = [];

    document.addEventListener('DOMContentLoaded', () => {
      const config = Storage.getConfig();
      if (config.empresa) document.getElementById('empresa-nome').textContent = config.empresa;
      renderizarClientes();
    });

    function renderizarClientes(filtro = '') {
      clientesData = Storage.getClientes();
      const orcamentos = Storage.getOrcamentos();

      let lista = clientesData;
      if (filtro) {
        const q = filtro.toLowerCase();
        lista = clientesData.filter(c =>
          c.nome.toLowerCase().includes(q) ||
          (c.email || '').toLowerCase().includes(q) ||
          (c.empresa || '').toLowerCase().includes(q)
        );
      }

      const tbody = document.getElementById('tabela-clientes');
      if (lista.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="6">Nenhum cliente encontrado.</td></tr>`;
        return;
      }

      tbody.innerHTML = lista.map(c => {
        const qtdOrc = orcamentos.filter(o => o.clienteId === c.id).length;
        return `
          <tr>
            <td><strong>${c.nome}</strong></td>
            <td>${c.empresa || '—'}</td>
            <td>${c.email || '—'}</td>
            <td>${c.telefone || '—'}</td>
            <td>
              <a href="orcamentos.html?cliente=${c.id}" class="btn-link">${qtdOrc} orçamento(s)</a>
            </td>
            <td>
              <button onclick="editarCliente('${c.id}')" class="btn-link">Editar</button>
              <button onclick="novoOrcamentoParaCliente('${c.id}')" class="btn-link text-green">+ Orçamento</button>
              <button onclick="excluirCliente('${c.id}')" class="btn-link text-red">Excluir</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function filtrarClientes() {
      renderizarClientes(document.getElementById('busca').value);
    }

    function abrirModal(cliente = null) {
      document.getElementById('modal-titulo').textContent = cliente ? 'Editar Cliente' : 'Novo Cliente';
      document.getElementById('cliente-id').value = cliente?.id || '';
      document.getElementById('c-nome').value = cliente?.nome || '';
      document.getElementById('c-empresa').value = cliente?.empresa || '';
      document.getElementById('c-email').value = cliente?.email || '';
      document.getElementById('c-telefone').value = cliente?.telefone || '';
      document.getElementById('c-obs').value = cliente?.observacoes || '';
      document.getElementById('modal-overlay').style.display = 'block';
      document.getElementById('modal-cliente').style.display = 'block';
      document.getElementById('c-nome').focus();
    }

    function fecharModal() {
      document.getElementById('modal-overlay').style.display = 'none';
      document.getElementById('modal-cliente').style.display = 'none';
    }

    function salvarCliente(e) {
      e.preventDefault();
      const id = document.getElementById('cliente-id').value || null;
      const dados = {
        nome: document.getElementById('c-nome').value.trim(),
        empresa: document.getElementById('c-empresa').value.trim(),
        email: document.getElementById('c-email').value.trim(),
        telefone: document.getElementById('c-telefone').value.trim(),
        observacoes: document.getElementById('c-obs').value.trim(),
      };
      Storage.salvarCliente(dados, id);
      fecharModal();
      renderizarClientes();
      mostrarToast('Cliente salvo!');
    }

    function editarCliente(id) {
      const cliente = Storage.getClientes().find(c => c.id === id);
      if (cliente) abrirModal(cliente);
    }

    function excluirCliente(id) {
      if (!confirm('Tem certeza? Os orçamentos deste cliente não serão excluídos.')) return;
      Storage.excluirCliente(id);
      renderizarClientes();
      mostrarToast('Cliente excluído.');
    }

    function novoOrcamentoParaCliente(id) {
      window.location.href = `novo-orcamento.html?clienteId=${id}`;
    }
  </script>
</body>
</html>
