<div class="quest-section">
    <div class="badge-level">LVL 05</div>
    <h2>RENDERIZADOR DE ÍCONES</h2>
    <p>Arraste um SVG para ver a mágica do <b>FileReader</b> em ação.</p>
    
    <div class="game-container">
        <div class="drop-zone" id="drop-zone">
            <div class="drop-content">
                <span class="pixel-icon">📥</span>
                <p>SOLTE O SVG AQUI</p>
            </div>
            <input type="file" id="file-input" accept=".svg" style="display: none;">
        </div>

        <div class="preview-card" id="preview-card">
            <div id="svg-display">
                <span style="opacity: 0.3;">Aguardando Asset...</span>
            </div>
            <div class="asset-info">
                <span id="asset-name">Nenhum arquivo</span>
                <div class="controls">
                    <input type="color" id="color-picker" value="#00f5ff">
                    <small>Mudar cor via CSS</small>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .quest-section {
        background: var(--card-bg);
        border: 2px solid var(--primary);
        border-radius: var(--radius);
        padding: 30px;
        margin-top: 40px;
        box-shadow: 0 0 20px rgba(112, 0, 255, 0.2);
    }

    .badge-level {
        background: var(--accent);
        color: #000;
        display: inline-block;
        padding: 2px 10px;
        font-family: 'Press Start 2P';
        font-size: 10px;
        margin-bottom: 15px;
    }

    .game-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 20px;
    }

    .drop-zone {
        border: 3px dashed var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius);
        transition: 0.3s;
        min-height: 200px;
    }

    .drop-zone.active {
        background: rgba(0, 245, 255, 0.2);
        border-color: var(--accent);
    }

    .preview-card {
        background: #050510;
        border-radius: var(--radius);
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255,255,255,0.1);
    }

    /* O pulo do gato: Estilizando o SVG injetado */
    #svg-display svg {
        width: 100px;
        height: 100px;
        fill: var(--primary); /* Cor padrão */
        transition: 0.3s;
    }

    .asset-info {
        margin-top: 20px;
        text-align: center;
        width: 100%;
        border-top: 1px solid #222;
        padding-top: 15px;
    }

    .controls {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    @media (max-width: 768px) {
        .game-container { grid-template-columns: 1fr; }
    }
</style>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const svgDisplay = document.getElementById('svg-display');
    const assetName = document.getElementById('asset-name');
    const colorPicker = document.getElementById('color-picker');

    dropZone.onclick = () => fileInput.click();

    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('active'); };
    dropZone.ondragleave = () => dropZone.classList.remove('active');

    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('active');
        const file = e.dataTransfer.files[0];
        handleFile(file);
    };

    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function handleFile(file) {
        if (file && file.type === "image/svg+xml") {
            const reader = new FileReader();
            reader.onload = (event) => {
                // Injeta o código do SVG direto no HTML
                svgDisplay.innerHTML = event.target.result;
                assetName.innerText = file.name;
                
                // Força o SVG a aceitar a cor do picker
                const svgElement = svgDisplay.querySelector('svg');
                if(svgElement) svgElement.style.fill = colorPicker.value;
            };
            reader.readAsText(file);
        } else {
            alert("APENAS ARQUIVOS .SVG SÃO ACEITOS NESTA QUEST!");
        }
    }

    // Listener para o seletor de cor
    colorPicker.oninput = (e) => {
        const svgElement = svgDisplay.querySelector('svg');
        if(svgElement) svgElement.style.fill = e.target.value;
    };
</script>
